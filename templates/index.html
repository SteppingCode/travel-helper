<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelPlanner - Создайте свою поездку</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="navbar">
    <div class="nav-left">
        <i class="fa-solid fa-bars burger-menu"></i>
        <div class="logo">
            <i class="fa-solid fa-plane"></i> TravelPlanner
        </div>
    </div>
    <nav class="nav-links navbar-menu">
        <a href="/">Главная</a>
        <a href="/details">Мои путешествия</a>
        <a href="/create" class="active">Создать поездку</a>
        <a href="#">Места</a>
    </nav>
    <div class="nav-right">
        <i class="fa-solid fa-circle-user profile-icon"></i>
    </div>
</header>

    <main class="main-container">
        <div class="hero-card" style="background-image: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), url('{{ url_for('static', path='images/background.jpg') }}');">

            <h2>Создайте свою идеальную поездку! <i class="fa-solid fa-route"></i></h2>

            <form action="/create_route" method="POST" class="grid-form">

                <div class="input-field">
                    <i class="fa-solid fa-pen icon"></i>
                    <input type="text" name="trip_name" placeholder="Название поездки..." required>
                    <i class="fa-solid fa-chevron-down arrow"></i>
                </div>

                <div class="input-field" onclick="this.querySelector('input').showPicker()">
                    <i class="fa-solid fa-calendar-days icon"></i>
                    <input type="date" name="trip_date" placeholder="Выбор даты...">
                    <i class="fa-solid fa-chevron-down arrow"></i>
                </div>

                <div class="input-field">
                    <i class="fa-solid fa-location-dot icon"></i>
                    <input type="text" name="destination" placeholder="Пункт назначения..." required>
                    <i class="fa-solid fa-chevron-down arrow"></i>
                </div>

                <div class="input-field">
                    <i class="fa-solid fa-dollar-sign icon"></i>
                    <input type="number" name="budget" placeholder="Бюджет...">
                    <i class="fa-solid fa-chevron-down arrow"></i>
                </div>

                <div class="button-container">
                    <button type="submit" class="submit-btn">
                        Создать маршрут <br>
                        <i class="fa-solid fa-briefcase"></i>
                    </button>
                </div>

            </form>
        </div>
    </main>

</body>
</html>
