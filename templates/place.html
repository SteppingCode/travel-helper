<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/place.css">
    <title>TravelPlanner</title>

</head>
<body>
    <style>
        body{
            background-image: url("/static/photo/фон2.jpg");
              background-size:cover;
        }
    </style>
    <header>
        <nav>
            <div class="logo">
                <img src="static\photo\меню.png" alt="Logo_menu" >
                <img src= "static\photo\самолет_лого.png" alt="Logo" style="transform: rotate(45deg);">
                <span>TravelPlanner</span>
            </div>
            <nav>
                 <ul>
                    <li><a href="/">Главная</a></li>
                    <li><a href="/my-trips">Мои путешествия</a></li>
                    <li><a href="/create-trip">Создать поездку</a></li>
                    <li><a href="/popular_place">Места</a></li>
                </ul>
            </nav>
            <div class="profile-icon">
                <img src="static\photo\profile.png" alt="Profile" width="30" height="30">
                
            </div>
        </nav>
    </header>
    <section>
        <h1 style="text-align: center; margin: 30px 0 10px 0;">Популярные места</h1>
        
        <div class="search-container">
            <input type="text" id="searchInput" class="search-bar" 
                   placeholder="Поиск по названию, стране, описанию или тегам...">
        </div>

        <div class="places-grid" id="placesGrid">
            {% for place in places %}
            <div class="place-card">
                <img src="{{ place.image }}" alt="{{ place.name }}">
                <div class="place-info">
                    <div class="place-name"><a href="/inf/{{place.id}}">{{ place.name }}</a></div>
                    <div class="place-name_country">{{ place.country }}</div>
                    <div class="place-rating">★{{ place.rating }}</div>
                    <div class="place-description">{{ place.description }}</div>
                    <div class="tags">
                        {% for tag in place.tags %}
                            <span class="tag">{{ tag }}</span>
                        {% endfor %}
                    </div>
                </div>
            </div>
            {%else%}
            <p style="grid-column: 1 / -1; text-align: center; font-size: 18px; color: #666;">
                Ничего не найдено 😔
            </p>
            {% endfor %}
        </div>
    </section>
    <script>
        // Мгновенный поиск на клиенте
        document.getElementById('searchInput').addEventListener('input', function() {
            const filter = this.value.toLowerCase().trim();
            const cards = document.querySelectorAll('.place-card');

            cards.forEach(card => {
                const text = card.textContent.toLowerCase();
                card.style.display = text.includes(filter) ? 'block' : 'none';
            });
        });
    </script>
    
</body>
</html>
